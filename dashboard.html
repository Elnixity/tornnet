<!DOCTYPE html>
<html>
<head>
  <title>TornNet Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>💀 TornNet</h2>

    <button onclick="showTab('dashboard', event)">Dashboard</button>
    <button onclick="showTab('tools', event)">Tools</button>
    <button onclick="showTab('premium', event)">💊 Premium</button>
    <button onclick="showTab('profile', event)">Profile</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <span id="username">Not Logged In</span>
    </div>

    <!-- LOGIN -->
    <div id="loginCard" class="card">
      <h2>🔑 Login with Torn API</h2>
      <input type="password" id="apiKey" placeholder="Enter API Key">
      <button onclick="login()">Login</button>
      <p id="loginStatus"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab" style="display:none; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;">

      <div class="card" id="statusCard">Loading...</div>
      <div class="card" id="statsCard">Loading...</div>
      <div class="card" id="overviewCard">Loading...</div>

    </div>

    <!-- TOOLS -->
    <div id="tools" class="tab" style="display:none;">
      <div class="card">
        <h3>💰 Split Calculator</h3>
        <input id="splitTotal" placeholder="Total Money">
        <input id="splitPeople" placeholder="Number of People">
        <button onclick="calculateSplit()">Calculate</button>
        <p id="splitResult"></p>
      </div>
    </div>

    <!-- PREMIUM -->
    <div id="premium" class="tab" style="display:none;">
      <div class="card">
        🔒 Premium Loading...
      </div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="tab" style="display:none;">
      <div class="card">
        <p id="profileInfo"></p>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
