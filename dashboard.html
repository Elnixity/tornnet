<!DOCTYPE html>
<html>
<head>
  <title>TornNet Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>💀 TornNet</h2>
    <button id="tab-dashboard">Dashboard</button>
    <button id="tab-tools">Tools</button>
    <button id="tab-premium">💊 Premium</button>
    <button id="tab-profile">Profile</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
      <span id="username">Not Logged In</span>
    </div>

    <!-- LOGIN CARD -->
    <div id="loginCard" class="card">
      <h2>🔑 Login with Torn API</h2>
      <input type="password" id="apiKey" placeholder="Enter API Key">
      <button onclick="login()">Login</button>
      <p id="loginStatus"></p>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="tab" style="display:none; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px;">

      <!-- STATUS CARD -->
      <div class="card" id="statusCard">Loading...</div>

      <!-- STATS CARD -->
      <div class="card" id="statsCard">Loading...</div>

      <!-- OVERVIEW CARD -->
      <div class="card" id="overviewCard">Loading...</div>

    </div>

    <!-- TOOLS -->
    <div class="card">
  <h3>💰 Split Calculator</h3>
  <input id="splitTotal" placeholder="Total Money">
  <input id="splitPeople" placeholder="People">
  <button onclick="calculateSplit()">Calculate</button>
  <p id="splitResult"></p>
    </div>

    <!-- PREMIUM -->
    <div id="premium" class="tab" style="display:none;">
      <div class="card locked">💊 Premium Feature Locked</div>
    </div>

    <!-- PROFILE -->
    <div id="profile" class="tab" style="display:none;">
      <div class="card">
        <p id="profileInfo"></p>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
